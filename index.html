<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZemExpress</title>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);
const moto = params.get("moto");

// Appel silencieux vers Apps Script
fetch("TON_NOUVEAU_LIEN_EXEC?moto=" + moto)
  .catch(e => console.log("Erreur : ", e));

// Redirection vers l'application
window.location.href = "https://app.zemexpress.preprod.cysc.fr/driver/register";
</script>

</body>
</html>
